<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpiGraph-AI | Gujarat District Map</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar">
    <a href="index.html" class="nav-logo">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
        </div>
        <span>EpiGraph<span class="logo-ai">AI</span></span>
    </a>
    <div class="nav-breadcrumb" id="breadcrumb"></div>
    <div class="nav-links" style="display:flex;align-items:center;gap:1rem">
        <span id="dataBadge" class="data-badge"></span>
        <a href="prevention.html" class="nav-link">Prevention</a>
    </div>
</nav>

<div class="map-page-layout">
    <div class="map-main">
        <div class="map-header">
            <p class="hero-kicker" style="justify-content:center;margin-bottom:0.25rem;">Click a district to explore</p>
            <h1>Gujarat Risk Map</h1>
        </div>
        <div class="map-scene-wrap" style="position:relative">
            <div class="map-3d" id="gujaratWrapper">
                <svg id="gujaratMap" width="500" height="560"></svg>
            </div>
            <div class="map-legend">
                <div class="legend-row"><span class="legend-dot high"></span> High Risk</div>
                <div class="legend-row"><span class="legend-dot medium"></span> Medium Risk</div>
                <div class="legend-row"><span class="legend-dot low"></span> Low Risk</div>
            </div>
        </div>
        <div id="mapTooltip" class="map-tooltip"></div>
    </div>

    <div class="map-sidebar">
        <div class="sidebar-block">
            <div class="sidebar-label">Districts</div>
            <div id="districtList"></div>
        </div>
        <div class="sidebar-block">
            <div class="sidebar-label">Connectivity</div>
            <div id="connList"></div>
        </div>
    </div>
</div>

<div class="container" style="margin-top: 3rem; padding-bottom: 3rem;">
    <section class="section" style="padding-top:0;">
        <div class="section-label">Risk Overview</div>
        <div id="riskCards" class="risk-cards-grid"></div>
    </section>
</div>

<footer class="footer" style="margin-top:0;">
    <p>&copy; 2026 EpiGraph-AI</p>
</footer>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/panel.js"></script>
<script src="js/map.js"></script>
</body>
</html>
